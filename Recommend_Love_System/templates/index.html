<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Счетчик любви ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fdfcfb 100%);
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px 35px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }
        h1 {
            text-align: center;
            color: #e84393;
            font-size: 2.2rem;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #6c5ce7;
            font-weight: 600;
            margin-bottom: 25px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            color: #2d3436;
            font-size: 0.95rem;
            margin-bottom: 5px;
        }
        .value-display {
            color: #e84393;
            background: #ffeef5;
            padding: 0 10px;
            border-radius: 20px;
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: linear-gradient(to right, #fd79a8, #6c5ce7);
            border-radius: 10px;
            outline: none;
            transition: opacity 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #e84393;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(232, 67, 147, 0.4);
            border: 2px solid white;
        }
        .radio-group {
            display: flex;
            justify-content: center;
            gap: 30px;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 30px;
            margin: 15px 0 25px 0;
        }
        .radio-group label {
            font-weight: 500;
            cursor: pointer;
            gap: 8px;
            align-items: center;
        }
        .radio-group input[type="radio"] {
            accent-color: #e84393;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #fd79a8, #6c5ce7);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 2px;
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.3);
        }
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 35px rgba(108, 92, 231, 0.4);
        }
        .btn:active {
            transform: scale(0.98);
        }
        #result-box {
            margin-top: 30px;
            padding: 25px;
            border-radius: 30px;
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            text-align: center;
            display: none;
            animation: fadeIn 0.8s ease;
        }
        #result-box .percent {
            font-size: 4.5rem;
            font-weight: 900;
            color: #d63031;
            line-height: 1.2;
        }
        #result-box .comment {
            font-size: 1.1rem;
            color: #2d3436;
            font-weight: 500;
            margin-top: 8px;
        }
        #result-box .heart-anim {
            font-size: 2.5rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loader {
            display: none;
            text-align: center;
            margin-top: 15px;
            font-size: 1.2rem;
            color: #6c5ce7;
        }
        .footer {
            text-align: center;
            margin-top: 25px;
            color: #b2bec3;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>💘 Счетчик любви</h1>
    <p class="subtitle">✨ Заполни анкету и узнай правду ✨</p>

    <form id="loveForm">
        <!-- Вопрос 1 -->
        <div class="form-group">
            <label>📨 Сообщений за день: <span class="value-display" id="val_messages">25</span></label>
            <input type="range" id="messages" name="messages" min="0" max="50" value="25" step="1">
        </div>

        <!-- Вопрос 2 -->
        <div class="form-group">
            <label>⏱ Среднее время ответа (сек): <span class="value-display" id="val_response_time">100</span></label>
            <input type="range" id="response_time" name="response_time" min="5" max="300" value="100" step="1">
        </div>

        <!-- Вопрос 3 -->
        <div class="form-group">
            <label>😍 Смайлов/сердечек: <span class="value-display" id="val_emojis">10</span></label>
            <input type="range" id="emojis" name="emojis" min="0" max="20" value="10" step="1">
        </div>

        <!-- Вопрос 4 -->
        <div class="form-group">
            <label>💬 Она/Он написала(л) первой(ым)? <span class="value-display" id="val_first_msg">1 (Да)</span></label>
            <input type="range" id="first_msg" name="first_msg" min="0" max="1" value="1" step="1">
        </div>

        <!-- Вопрос 5 -->
        <div class="form-group">
            <label>📈 Позитивный тон общения: <span class="value-display" id="val_positive_ratio">0.7</span></label>
            <input type="range" id="positive_ratio" name="positive_ratio" min="0" max="100" value="70" step="1">
        </div>

        <!-- Ролевая логика (Кто заполняет?) -->
        <div class="radio-group">
            <label><input type="radio" name="gender" value="1" checked> 👨 Я — Парень</label>
            <label><input type="radio" name="gender" value="0"> 👩 Я — Девушка</label>
        </div>

        <button type="submit" class="btn">🔮 Узнать результат</button>
    </form>

    <div id="result-box">
        <div class="heart-anim">💗</div>
        <div class="percent" id="display_percent">0%</div>
        <div class="comment" id="display_comment">Загрузка...</div>
    </div>
    <div class="loader" id="loader">⏳ Думаем над ответом...</div>
    <div class="footer">© 2026 Ваша личная вселенная любви</div>
</div>

<script>
    // Обновление значений на ползунках в реальном времени
    document.getElementById('messages').addEventListener('input', function() {
        document.getElementById('val_messages').textContent = this.value;
    });
    document.getElementById('response_time').addEventListener('input', function() {
        document.getElementById('val_response_time').textContent = this.value;
    });
    document.getElementById('emojis').addEventListener('input', function() {
        document.getElementById('val_emojis').textContent = this.value;
    });
    document.getElementById('first_msg').addEventListener('input', function() {
        const val = this.value == 1 ? '✅ Да' : '❌ Нет';
        document.getElementById('val_first_msg').textContent = this.value + ' (' + val + ')';
    });
    document.getElementById('positive_ratio').addEventListener('input', function() {
        document.getElementById('val_positive_ratio').textContent = (this.value / 100).toFixed(2);
    });

    // Обработка отправки формы
    document.getElementById('loveForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Показываем лоадер, прячем старый результат
        document.getElementById('loader').style.display = 'block';
        document.getElementById('result-box').style.display = 'none';

        // Собираем данные
        const messages = document.getElementById('messages').value;
        const response_time = document.getElementById('response_time').value;
        const emojis = document.getElementById('emojis').value;
        const first_msg = document.getElementById('first_msg').value;
        const positive_ratio = (document.getElementById('positive_ratio').value / 100).toFixed(2);
        const is_male = document.querySelector('input[name="gender"]:checked').value;

        // Формируем URL для GET запроса (проще всего)
        const url = `/predict?messages=${messages}&response_time=${response_time}&emojis=${emojis}&first_msg=${first_msg}&positive_ratio=${positive_ratio}&is_male=${is_male}`;

        try {
            const response = await fetch(url);
            const data = await response.json();

            // Анимация появления результата
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                const resultBox = document.getElementById('result-box');
                resultBox.style.display = 'block';
                
                // Анимируем цифру от 0 до финала
                const target = data.love_percent;
                const displayElem = document.getElementById('display_percent');
                const commentElem = document.getElementById('display_comment');
                commentElem.textContent = data.message;
                
                let current = 0;
                const interval = setInterval(() => {
                    if (current >= target) {
                        clearInterval(interval);
                        displayElem.textContent = target + '%';
                        return;
                    }
                    current += Math.max(1, Math.floor(target / 30));
                    if (current > target) current = target;
                    displayElem.textContent = Math.floor(current) + '%';
                }, 30);

            }, 500);

        } catch (error) {
            document.getElementById('loader').style.display = 'none';
            alert('Ошибка соединения с сервером. Запустили ли вы app.py?');
            console.error(error);
        }
    });
</script>

</body>
</html>
